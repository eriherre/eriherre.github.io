<!DOCTYPE html>

<html lang="en">
    <head>

      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
      <link href="https://fonts.googleapis.com/css2?family=Noticia+Text&display=swap" rel="stylesheet">
      <link href="styles.css" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ==" crossorigin="anonymous" referrerpolicy="no-referrer">
      <link rel="icon" type="image/x-icon" href="images/favicon.jpg">

      <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
      <script src="common.js"></script>

      <title>Contact</title>

    </head>
    <body>
      <!-- Reference to the header file -->
     <div id="header"></div>


     <h2>Contact</h2>

     <br>
     <div class="form-container">
      <form name="gform" id="gform" enctype="text/plain" action="https://docs.google.com/forms/d/e/1FAIpQLSffXIA0wx7nabbL1Isoy3jecLNeyRLTBUp9FtYfmLkLOIqc-Q/formResponse?" target="hidden_iframe" onsubmit="submitted=true;">
        <label for="fname">First Name</label>
        <input type="text" id="entry.2118239579" name="entry.2118239579" placeholder="Your name..">

        <label for="lname">Last Name</label>
        <input type="text" id="entry.2107038557" name="entry.2107038557" placeholder="Your last name..">

        <label for="email">Email</label>
        <input type="text" id="entry.1945852518" name="entry.1945852518" placeholder="Your email..">

        <label for="subject">Subject</label>
        <textarea id="entry.1517603198" name="entry.1517603198" placeholder="Write something.." style="height:200px"></textarea>

        <div style="text-align:center;">
          <input type="submit" value="Send Email">
        </div>
      </form>

      <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {}"></iframe>

    </div>

     <!-- Reference to the footer file -->
     <div id="footer"></div>

    </body>
</html>

<script src="assets/js/jquery.min.js"></script>
<script type="text/javascript">var submitted = false;</script>
<script type="text/javascript">
  $('#gform').on('submit', function (e) {
    e.preventDefault(); // prevent form submission
    var fname = $('#entry\\.2118239579').val();
    var lname = $('#entry\\.2107038557').val();
    var email = $('#entry\\.1945852518').val();
    var subject = $('#entry\\.1517603198').val();
    var emailRegex = /^([\w-\.]+@([\w-]+\.)+[\w-]{2,4})?$/; // regex for email validation

    // check if all fields are filled and email is valid
    if (fname && lname && email && emailRegex.test(email) && subject) {
      $('#gform *').fadeOut(2000);
      $('#gform').prepend('Thank you for reaching out. I have received your message and will be in touch shortly.');
      setTimeout(function () { window.location.href = "https://eriherre.github.io"; }, 8000);
      // setTimeout(function () { location.reload(); }, 8000);
      document.forms['gform'].submit();
    } else {
      alert('Please fill all fields with valid values!');
    }
  });
</script>
